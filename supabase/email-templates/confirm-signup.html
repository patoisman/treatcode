<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Treatcode</title>
</head>
<body style="margin:0;padding:0;background-color:#f0f4f8;">
<table width="100%" cellpadding="0" cellspacing="0" border="0" role="presentation" style="background-color:#f0f4f8;">
<tr><td align="center" style="padding:40px 16px;">
  <table width="600" cellpadding="0" cellspacing="0" border="0" role="presentation" style="max-width:600px;width:100%;">
    <tr>
      <td style="background-color:#1e40af;background-image:linear-gradient(135deg,#1e40af 0%,#4f46e5 100%);padding:24px 40px;border-radius:8px 8px 0 0;">
        <span style="color:#ffffff;font-size:22px;font-weight:700;letter-spacing:-0.5px;font-family:Consolas,'Courier New',monospace;">Treatcode</span>
      </td>
    </tr>
    <tr>
      <td style="background-color:#ffffff;padding:36px 40px 12px;border-left:1px solid #e2e8f0;border-right:1px solid #e2e8f0;">
        <p style="margin:0 0 16px;font-size:15px;line-height:1.7;color:#374151;font-family:Consolas,'Courier New',monospace;">Thanks for signing up to Treatcode.</p>
        <p style="margin:0 0 24px;font-size:15px;line-height:1.7;color:#374151;font-family:Consolas,'Courier New',monospace;">Please confirm your email address to get started saving for your treats.</p>
        <table cellpadding="0" cellspacing="0" border="0" role="presentation" style="margin:0 0 8px;">
          <tr><td style="background-color:#1e40af;border-radius:6px;">
            <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:12px 28px;background-color:#1e40af;color:#ffffff;text-decoration:none;border-radius:6px;font-weight:700;font-size:14px;font-family:Consolas,'Courier New',monospace;">Confirm email address &rarr;</a>
          </td></tr>
        </table>
      </td>
    </tr>
    <tr>
      <td style="background-color:#ffffff;padding:0 40px 28px;border:1px solid #e2e8f0;border-top:none;border-radius:0 0 8px 8px;">
        <hr style="border:none;border-top:1px solid #e2e8f0;margin:24px 0 20px;">
        <p style="margin:0;font-size:12px;line-height:1.6;color:#94a3b8;font-family:Consolas,'Courier New',monospace;">
          If you didn't create a Treatcode account, you can safely ignore this email.
          Questions? Reply to this email or visit <a href="{{ .SiteURL }}" style="color:#1e40af;text-decoration:none;">treat-code.com</a>.
        </p>
      </td>
    </tr>
  </table>
</td></tr>
</table>
</body>
</html>
